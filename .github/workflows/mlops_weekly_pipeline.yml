name: MLOps Weekly Pipeline - Air Quality Forecasting

on:
  # Weekly schedule: Every Monday at 6:00 AM UTC
  schedule:
    - cron: '0 6 * * 1'
  
  # Manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      force_retrain:
        description: 'Force full retraining (ignore drift check)'
        required: false
        type: boolean
        default: false
      skip_ingestion:
        description: 'Skip data ingestion (use existing data)'
        required: false
        type: boolean
        default: false

env:
  PYTHON_VERSION: '3.10'
  MLFLOW_TRACKING_URI: './mlruns'

jobs:
  # ============================================
  # JOB 1: Data Ingestion
  # ============================================
  data-ingestion:
    name: 📥 Fetch New OpenAQ Data
    runs-on: ubuntu-latest
    outputs:
      new_data_fetched: ${{ steps.check.outputs.fetched }}
      merged_rows: ${{ steps.ingest.outputs.rows }}
      date_range: ${{ steps.ingest.outputs.date_range }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Create directories
        run: |
          mkdir -p data/raw data/processed
          mkdir -p models models/production
          mkdir -p mlruns metrics
      
      - name: Run data ingestion
        id: ingest
        if: github.event.inputs.skip_ingestion != 'true'
        run: |
          python batch_ingest.py --rolling-days 90
          
          # Get merged data info
          python -c "
          import pandas as pd
          import os
          df = pd.read_parquet('data/raw/delhi_merged.parquet')
          rows = len(df)
          date_range = f\"{df['datetime'].min().date()} to {df['datetime'].max().date()}\"
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              print(f'rows={rows}', file=f)
              print(f'date_range={date_range}', file=f)
          "
      
      - name: Check if new data was fetched
        id: check
        run: |
          if [ -f "data/watermark.json" ]; then
            echo "fetched=true" >> $GITHUB_OUTPUT
          else
            echo "fetched=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Upload data artifact
        uses: actions/upload-artifact@v4
        with:
          name: merged-data
          path: data/raw/delhi_merged.parquet
          retention-days: 7

  # ============================================
  # JOB 2: Check Drift & Decide Training
  # ============================================
  check-drift:
    name: 🔍 Check Data Drift
    runs-on: ubuntu-latest
    needs: data-ingestion
    outputs:
      should_retrain: ${{ steps.drift.outputs.retrain }}
      drift_score: ${{ steps.drift.outputs.score }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Download data
        uses: actions/download-artifact@v4
        with:
          name: merged-data
          path: data/raw/
      
      - name: Check drift
        id: drift
        run: |
          python scripts/check_drift.py
          
          if [ -f "drift_result.txt" ]; then
            DRIFT_SCORE=$(cat drift_result.txt)
            echo "score=$DRIFT_SCORE" >> $GITHUB_OUTPUT
            
            if (( $(echo "$DRIFT_SCORE > 0.15" | bc -l) )) || [ "${{ github.event.inputs.force_retrain }}" == "true" ]; then
              echo "retrain=true" >> $GITHUB_OUTPUT
            else
              echo "retrain=false" >> $GITHUB_OUTPUT
              echo "Drift score low (${DRIFT_SCORE}) - skipping retraining" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "retrain=true" >> $GITHUB_OUTPUT
            echo "score=1.0" >> $GITHUB_OUTPUT
            echo "First run - training required" >> $GITHUB_STEP_SUMMARY
          fi

  # ============================================
  # JOB 3: Model Training (Conditional)
  # ============================================
  model-training:
    name: 🧠 Train HEART Model
    runs-on: ubuntu-latest
    needs: [data-ingestion, check-drift]
    if: needs.check-drift.outputs.should_retrain == 'true'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Download data
        uses: actions/download-artifact@v4
        with:
          name: merged-data
          path: data/raw/
      
      - name: Train Baseline and HEART models
        run: |
          python train_pipeline.py \
            --seq-length 72 \
            --num-heads 2 \
            --num-layers 1 \
            --dropout 0.3 \
            --epochs 100 \
            --rolling-days 90
      
      - name: Display training results
        run: |
          echo "## Training Complete" >> $GITHUB_STEP_SUMMARY
          if [ -f "models/champion_metrics.json" ]; then
            echo "✅ Model training finished successfully" >> $GITHUB_STEP_SUMMARY
            cat models/champion_metrics.json | python -m json.tool >> $GITHUB_STEP_SUMMARY
          fi
      
      - name: Upload trained models
        uses: actions/upload-artifact@v4
        with:
          name: trained-models
          path: |
            models/heart_best.keras
            models/baseline_best.keras
            models/scaler.pkl
            models/target_scaler.pkl
            models/champion_metrics.json
          retention-days: 30
      
      - name: Upload MLflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-artifacts
          path: mlruns/
          retention-days: 30

  # ============================================
  # JOB 4: Batch Predictions
  # ============================================
  batch-predictions:
    name: 🔮 Generate Batch Predictions
    runs-on: ubuntu-latest
    needs: [data-ingestion, model-training]
    if: always() && !cancelled()
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Download models
        uses: actions/download-artifact@v4
        with:
          name: trained-models
          path: models/
        continue-on-error: true
      
      - name: Download data
        uses: actions/download-artifact@v4
        with:
          name: merged-data
          path: data/raw/
      
      - name: Run batch predictions
        run: |
          python scripts/batch_predict.py
      
      - name: Upload predictions
        uses: actions/upload-artifact@v4
        with:
          name: predictions
          path: predictions/
          retention-days: 7
      
      - name: Display prediction summary
        run: |
          if [ -f "predictions/latest_predictions.csv" ]; then
            echo "## Predictions Summary" >> $GITHUB_STEP_SUMMARY
            echo "📊 Latest predictions available in artifacts" >> $GITHUB_STEP_SUMMARY
            tail -5 predictions/latest_predictions.csv >> $GITHUB_STEP_SUMMARY
          fi

  # ============================================
  # JOB 5: Update Metrics
  # ============================================
  update-metrics:
    name: 📊 Update Metrics Database
    runs-on: ubuntu-latest
    needs: [model-training, batch-predictions]
    if: always()
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Download models
        uses: actions/download-artifact@v4
        with:
          name: trained-models
          path: models/
        continue-on-error: true
      
      - name: Update metrics database
        run: |
          python scripts/update_metrics.py
      
      - name: Upload updated metrics
        uses: actions/upload-artifact@v4
        with:
          name: metrics-db
          path: metrics/
          retention-days: 90
      
      - name: Display metrics summary
        run: |
          if [ -f "metrics/summary.json" ]; then
            echo "## Metrics Summary" >> $GITHUB_STEP_SUMMARY
            cat metrics/summary.json | python -m json.tool >> $GITHUB_STEP_SUMMARY
          fi

  # ============================================
  # JOB 6: Cleanup Old Artifacts
  # ============================================
  cleanup:
    name: 🧹 Cleanup Old Artifacts
    runs-on: ubuntu-latest
    needs: [update-metrics]
    if: always()
    
    steps:
      - name: Delete old artifacts
        uses: kolpav/purge-artifacts-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          expire-in: 30 days
      
      - name: Job Summary
        run: |
          echo "## Pipeline Complete ✅" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Data Ingestion | ${{ needs.data-ingestion.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Drift Check | ${{ needs.check-drift.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Model Training | ${{ needs.model-training.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Batch Predictions | ${{ needs.batch-predictions.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Metrics Update | ${{ needs.update-metrics.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📦 Artifacts available for 30 days" >> $GITHUB_STEP_SUMMARY